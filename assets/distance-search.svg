  <!-- legend -->
  <g transform="translate(32,430)">
    <rect class="home" x="0" y="-11" width="16" height="16" rx="3"/>
    <text class="label" x="24" y="2">Your village (center)</text>

    <circle class="oasis" cx="228" cy="-3" r="7"/>
