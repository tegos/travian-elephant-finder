<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 480" font-family="system-ui, -apple-system, Segoe UI, Roboto, sans-serif">
  <defs>
    <style>
      .bg { fill: #0f172a; }
      .grid { stroke: #1e293b; stroke-width: 1; }
      .tile-in { fill: #1e293b; }
      .tile-out { fill: #0b1220; }
      .ring { fill: rgba(249,115,22,0.08); stroke: #f97316; stroke-width: 2; stroke-dasharray: 6 5; }
      .home { fill: #38bdf8; }
      .oasis { fill: #22c55e; }
      .label { fill: #e2e8f0; font-size: 15px; }
      .muted { fill: #94a3b8; font-size: 13px; }
      .accent { fill: #f97316; font-weight: 700; }
      .radius-line { stroke: #f97316; stroke-width: 2; }
    </style>
  </defs>

  <rect class="bg" x="0" y="0" width="640" height="480" rx="12"/>

  <!-- title -->
  <text class="label" x="32" y="44" font-size="20" font-weight="700">Search by distance</text>
  <text class="muted" x="32" y="68">Scan every tile within DISTANCE of your village. No box to figure out.</text>

